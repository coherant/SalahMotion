  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n        <sc-for list=\"{{ units }}\" as=\"u\" hint-placeholder-count=\"3\">\n          <div onclick=\"{{ u.onToggle }}\" style=\"{{ u.rowStyle }}\">\n            <div style=\"{{ u.badgeStyle }}\">{{ u.badge }}<\u002Fdiv>\n            <div style=\"flex: 1;\">\n              <div style=\"display: flex; align-items: baseline; gap: 8px;\">\n                <span style=\"font-size: 15px; font-weight: 600; color: {{ ink }};\">{{ u.label }}<\u002Fspan>\n                <span style=\"font-family: 'Amiri', serif; direction: rtl; font-size: 14px; color: {{ u.arColor }};\">{{ u.ar }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size: 11px; letter-spacing: 0.3px; color: {{ u.tagColor }}; margin-top: 2px;\">{{ u.tag }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"{{ u.toggleStyle }}\">\n              <sc-if value=\"{{ u.checked }}\" hint-placeholder-val=\"{{ trueVal }}\">\n                <svg width=\"12\" height=\"10\" viewBox=\"0 0 11 9\" fill=\"none\"><path d=\"M1 4.5L4 7.5L10 1.5\" stroke=\"#16142a\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.08);\">\n        <div style=\"font-size: 13px; color: {{ muted }}; letter-spacing: 0.2px;\">{{ sheetBreakdown }}<\u002Fdiv>\n        <div style=\"font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: {{ ink }};\">{{ sheetTotalText }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div onclick=\"{{ closeSheet }}\" style=\"{{ sheetDoneStyle }}\">Confirm set<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-import>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 500, &quot;height&quot;: 980 },\n  &quot;prayer&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;fajr&quot;, &quot;dhuhr&quot;, &quot;asr&quot;, &quot;maghrib&quot;, &quot;isha&quot;], &quot;default&quot;: &quot;maghrib&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;language&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;ar&quot;, &quot;en&quot;, &quot;tr&quot;], &quot;default&quot;: &quot;en&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;guidance&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;full&quot;, &quot;prayer&quot;, &quot;silent&quot;], &quot;default&quot;: &quot;full&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;pace&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;slow&quot;, &quot;medium&quot;, &quot;fast&quot;], &quot;default&quot;: &quot;medium&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = {\n      prayer: props.prayer || 'maghrib',\n      language: props.language || 'en',\n      voice: 'hatif',\n      guidance: props.guidance || 'full',\n      pace: props.pace || 'medium',\n      muezzin: 'bilal',\n      sheetOpen: true,\n      units: {},\n    };\n  }\n\n  hexToRgba(hex, a) {\n    const h = hex.replace('#', '');\n    const r = parseInt(h.substring(0, 2), 16);\n    const g = parseInt(h.substring(2, 4), 16);\n    const b = parseInt(h.substring(4, 6), 16);\n    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';\n  }\n\n  renderVals() {\n    const PRAYERS = {\n      fajr:    { name: 'Fajr',    ar: 'الفجر',  rakah: 2, eyebrow: 'Before sunrise', time: '4:52 AM',  accent: '#e8a07e' },\n      dhuhr:   { name: 'Dhuhr',   ar: 'الظهر',  rakah: 4, eyebrow: 'Midday',         time: '12:21 PM', accent: '#d6a13a' },\n      asr:     { name: 'Asr',     ar: 'العصر',  rakah: 4, eyebrow: 'Afternoon',      time: '3:47 PM',  accent: '#e6a85a' },\n      maghrib: { name: 'Maghrib', ar: 'المغرب', rakah: 3, eyebrow: 'Sunset',         time: '6:58 PM',  accent: '#f0a05a' },\n      isha:    { name: 'Isha',    ar: 'العشاء', rakah: 4, eyebrow: 'Night',          time: '8:24 PM',  accent: '#9a86c7' },\n    };\n    const order = ['fajr', 'dhuhr', 'asr', 'maghrib', 'isha'];\n    const pk = PRAYERS[this.state.prayer] ? this.state.prayer : 'maghrib';\n    const p = PRAYERS[pk];\n    const accent = p.accent;\n    const rgba = (a) => this.hexToRgba(accent, a);\n\n    const ink = '#f4f1fa', muted = '#b8b2c8', faint = '#847e98';\n    const cardBg = 'rgba(255,255,255,0.035)', cardBorder = 'rgba(255,255,255,0.07)';\n\n    const labelStyle = 'font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: ' + faint + '; font-weight: 600;';\n\n    const rootStyle = 'height: 100%; box-sizing: border-box; background: linear-gradient(180deg, #1a1730 0%, #131120 60%, #100e1b 100%); color: ' + ink + '; display: flex; flex-direction: column; padding: 54px 0 26px; font-family: Manrope, system-ui, sans-serif; position: relative; overflow: hidden;';\n\n    const heroStyle = 'padding: 18px 20px; border-radius: 22px; border: 1px solid ' + rgba(0.28) + '; background: linear-gradient(155deg, ' + rgba(0.16) + ', ' + rgba(0.03) + '); cursor: pointer; flex: none;';\n\n    // --- languages ---\n    const langData = [\n      { key: 'ar', label: 'العربية', sub: 'Arabic',  amiri: true },\n      { key: 'en', label: 'English', sub: 'Latin' },\n      { key: 'tr', label: 'Türkçe',  sub: 'Turkish' },\n    ];\n    const segBase = 'flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 9px 4px; border-radius: 14px; cursor: pointer; border: 1px solid transparent; transition: background .2s;';\n    const langs = langData.map((l) => {\n      const on = this.state.language === l.key;\n      const segStyle = segBase + (on ? ' background: ' + rgba(0.18) + '; border-color: ' + rgba(0.4) + ';' : '');\n      const labelStyleL = (l.amiri ? \"font-family: 'Amiri', serif; font-size: 18px;\" : 'font-size: 15px; font-weight: 600;') + ' color: ' + (on ? ink : muted) + ';';\n      return { ...l, segStyle, labelStyle: labelStyleL, subColor: on ? accent : faint, onClick: () => this.setState({ language: l.key }) };\n    });\n\n    // --- pace ---\n    const paceData = [\n      { key: 'slow',   label: 'Slow',   sub: 'Unhurried' },\n      { key: 'medium', label: 'Medium', sub: 'Balanced' },\n      { key: 'fast',   label: 'Fast',   sub: 'Brisk' },\n    ];\n    const paces = paceData.map((pc) => {\n      const on = this.state.pace === pc.key;\n      const segStyle = segBase + (on ? ' background: ' + rgba(0.18) + '; border-color: ' + rgba(0.4) + ';' : '');\n      const labelStyleP = 'font-size: 15px; font-weight: 600; color: ' + (on ? ink : muted) + ';';\n      return { ...pc, segStyle, labelStyle: labelStyleP, subColor: on ? accent : faint, onClick: () => this.setState({ pace: pc.key }) };\n    });\n\n    // --- voices ---\n    const voiceData = [\n      { key: 'hatif',   name: 'Hātif',   ar: 'هاتف', tag: 'Voice',    desc: 'Guiding voice · natural speech' },\n      { key: 'reciter', name: 'Reciter', ar: 'قارئ', tag: 'Settings', desc: 'Choose a qārī in Settings' },\n    ];\n    const voices = voiceData.map((v) => {\n      const on = this.state.voice === v.key;\n      const cardStyle = 'flex: 1; display: flex; flex-direction: column; gap: 6px; padding: 13px 14px; border-radius: 16px; cursor: pointer; transition: all .2s; border: 1px solid ' + (on ? rgba(0.45) : cardBorder) + '; background: ' + (on ? rgba(0.12) : cardBg) + ';';\n      const dotStyle = on\n        ? 'width: 16px; height: 16px; border-radius: 50%; background: ' + accent + '; box-shadow: 0 0 10px ' + rgba(0.7) + '; flex: none;'\n        : 'width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.18); box-sizing: border-box; flex: none;';\n      const tagStyle = 'align-self: flex-start; font-size: 9.5px; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; padding: 2px 8px; border-radius: 100px; color: ' + (on ? accent : faint) + '; background: ' + (on ? rgba(0.16) : 'rgba(255,255,255,0.05)') + ';';\n      return { ...v, cardStyle, dotStyle, tagStyle, arColor: on ? accent : faint, onClick: () => this.setState({ voice: v.key }) };\n    });\n\n    // --- guidance ---\n    const guideData = [\n      { key: 'full',   n: '1', title: 'Full guidance', desc: 'Instructions + prayers' },\n      { key: 'prayer', n: '2', title: 'Prayer only',   desc: 'Recitation, no cues' },\n      { key: 'silent', n: '3', title: 'Silent guiding', desc: 'Gentle motion only' },\n    ];\n    const guides = guideData.map((g) => {\n      const on = this.state.guidance === g.key;\n      const rowStyle = 'display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 14px; cursor: pointer; transition: all .2s; border: 1px solid ' + (on ? rgba(0.35) : cardBorder) + '; background: ' + (on ? rgba(0.12) : cardBg) + ';';\n      const numStyle = 'width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex: none; ' + (on ? 'background: ' + accent + '; color: #16142a;' : 'border: 1px solid rgba(255,255,255,0.16); color: ' + faint + ';');\n      const radioStyle = on\n        ? 'width: 18px; height: 18px; border-radius: 50%; border: 5px solid ' + accent + '; box-sizing: border-box; flex: none;'\n        : 'width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.18); box-sizing: border-box; flex: none;';\n      return { ...g, rowStyle, numStyle, radioStyle, titleColor: on ? ink : muted, onClick: () => this.setState({ guidance: g.key }) };\n    });\n\n    // --- muezzins ---\n    const muezzinData = [\n      { key: 'bilal', name: 'Bilāl', ar: 'بلال',  initial: 'ب', style: 'Madinah cadence · unhurried' },\n      { key: 'idris', name: 'Idrīs', ar: 'إدريس', initial: 'إ', style: 'Flowing · melodic' },\n      { key: 'sadiq', name: 'Ṣādiq', ar: 'صادق',  initial: 'ص', style: 'Spacious · minimal' },\n      { key: 'yunus', name: 'Yūnus', ar: 'يونس',  initial: 'ي', style: 'Bright · resonant' },\n    ];\n    const muezzins = muezzinData.map((m) => {\n      const on = this.state.muezzin === m.key;\n      const avatarStyle = 'width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 40% 32%, ' + rgba(0.3) + ', rgba(255,255,255,0.04) 80%); box-sizing: border-box; transition: all .2s; ' + (on ? 'border: 2px solid ' + accent + '; box-shadow: 0 0 16px ' + rgba(0.55) + ';' : 'border: 1px solid rgba(255,255,255,0.12);');\n      return { ...m, avatarStyle, nameColor: on ? accent : faint, onClick: () => this.setState({ muezzin: m.key }) };\n    });\n    const feat = muezzinData.find((m) => m.key === this.state.muezzin) || muezzinData[0];\n    const featuredStyle = 'display: flex; align-items: center; gap: 15px; padding: 15px 16px; border-radius: 18px; margin-top: 10px; border: 1px solid ' + rgba(0.3) + '; background: linear-gradient(155deg, ' + rgba(0.14) + ', ' + rgba(0.03) + ');';\n    const featAvatarStyle = 'width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex: none; background: radial-gradient(circle at 40% 32%, ' + rgba(0.38) + ', rgba(255,255,255,0.04) 82%); border: 2px solid ' + accent + '; box-shadow: 0 0 20px ' + rgba(0.5) + ';';\n\n    const waveH = [6, 11, 8, 14, 9, 13, 7, 11, 6];\n    const wave = waveH.map((h, i) => 'width: 3px; height: ' + h + 'px; border-radius: 2px; background: ' + rgba(0.45 + (h / 30)) + '; transform-origin: bottom; animation: wavePulse ' + (1.4 + (i % 3) * 0.4) + 's ease-in-out infinite ' + (i * 0.12) + 's;');\n\n    // --- rakʿah composer ---\n    const arOf = { fard: 'فرض', sunnah: 'سنة', witr: 'وتر' };\n    const UNITS = {\n      fajr: [\n        { id: 'fajr_sb', kind: 'sunnah', emph: true, count: 2, when: 'before' },\n        { id: 'fajr_f',  kind: 'fard',  count: 2 },\n      ],\n      dhuhr: [\n        { id: 'dhuhr_sb', kind: 'sunnah', emph: true, count: 4, when: 'before' },\n        { id: 'dhuhr_f',  kind: 'fard',  count: 4 },\n        { id: 'dhuhr_sa', kind: 'sunnah', emph: true, count: 2, when: 'after' },\n      ],\n      asr: [\n        { id: 'asr_sb', kind: 'sunnah', emph: false, count: 4, when: 'before' },\n        { id: 'asr_f',  kind: 'fard',  count: 4 },\n      ],\n      maghrib: [\n        { id: 'maghrib_f',  kind: 'fard',  count: 3 },\n        { id: 'maghrib_sa', kind: 'sunnah', emph: true, count: 2, when: 'after' },\n      ],\n      isha: [\n        { id: 'isha_f',    kind: 'fard',  count: 4 },\n        { id: 'isha_sa',   kind: 'sunnah', emph: true, count: 2, when: 'after' },\n        { id: 'isha_witr', kind: 'witr',  count: 3 },\n      ],\n    };\n    const sel = this.state.units || {};\n    const rawUnits = UNITS[pk];\n    const units = rawUnits.map((u) => {\n      const checked = u.kind === 'fard' ? true : !!sel[u.id];\n      const label = u.kind === 'fard' ? 'Farḍ' : (u.kind === 'witr' ? 'Witr' : 'Sunnah');\n      let tag;\n      if (u.kind === 'fard') tag = 'Obligatory';\n      else if (u.kind === 'witr') tag = 'After ʿIshāʾ · witr';\n      else tag = (u.when === 'before' ? 'Before farḍ' : 'After farḍ') + (u.emph ? ' · emphasised' : ' · optional');\n      const rowStyle = 'display: flex; align-items: center; gap: 13px; padding: 11px 13px; border-radius: 14px; transition: all .2s; cursor: ' + (u.kind === 'fard' ? 'default' : 'pointer') + '; border: 1px solid ' + (checked ? rgba(0.32) : 'rgba(255,255,255,0.06)') + '; background: ' + (checked ? rgba(0.1) : 'rgba(255,255,255,0.035)') + ';';\n      const badgeStyle = \"width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: \" + ink + '; flex: none; background: ' + (checked ? rgba(0.16) : 'rgba(255,255,255,0.06)') + ';';\n      const toggleStyle = checked\n        ? 'width: 24px; height: 24px; border-radius: 50%; background: ' + accent + '; display: flex; align-items: center; justify-content: center; flex: none; box-shadow: 0 0 10px ' + rgba(0.6) + ';' + (u.kind === 'fard' ? ' opacity: 0.8;' : '')\n        : 'width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); box-sizing: border-box; flex: none;';\n      const onToggle = u.kind === 'fard' ? () => {} : () => {\n        const n = Object.assign({}, this.state.units);\n        if (n[u.id]) delete n[u.id]; else n[u.id] = true;\n        this.setState({ units: n });\n      };\n      return { id: u.id, badge: '×' + u.count, label, ar: arOf[u.kind], tag, checked,\n        rowStyle, badgeStyle, toggleStyle, onToggle, arColor: checked ? accent : faint, tagColor: faint };\n    });\n\n    let fardN = 0, sunnahN = 0, witrN = 0;\n    rawUnits.forEach((u) => {\n      const on = u.kind === 'fard' ? true : !!sel[u.id];\n      if (!on) return;\n      if (u.kind === 'fard') fardN += u.count;\n      else if (u.kind === 'witr') witrN += u.count;\n      else sunnahN += u.count;\n    });\n    const totalN = fardN + sunnahN + witrN;\n    const bParts = [];\n    if (fardN) bParts.push(fardN + ' farḍ');\n    if (sunnahN) bParts.push(sunnahN + ' sunnah');\n    if (witrN) bParts.push(witrN + ' witr');\n    const sheetBreakdown = bParts.join(' · ');\n    const sheetTotalText = totalN + ' rakʿahs';\n    const rakahText = (sunnahN || witrN) ? (totalN + ' rakʿahs · ' + bParts.join(' + ')) : (fardN + ' rakʿahs · farḍ');\n\n    const prayerChips = order.map((k) => {\n      const on = k === pk;\n      const chipStyle = 'padding: 8px 15px; border-radius: 100px; font-size: 13px; font-weight: 600; cursor: pointer; flex: none; white-space: nowrap; transition: all .2s; ' + (on ? 'background: ' + accent + '; color: #16142a;' : 'background: rgba(255,255,255,0.05); color: ' + muted + '; border: 1px solid rgba(255,255,255,0.08);');\n      return { key: k, name: PRAYERS[k].name, chipStyle, onClick: () => this.setState({ prayer: k }) };\n    });\n\n    const sheetDoneStyle = 'height: 50px; border-radius: 15px; background: ' + accent + '; color: #16142a; font-size: 15px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 28px ' + rgba(0.3) + ';';\n\n    // --- summary + start ---\n    const langName = { ar: 'Arabic', en: 'English', tr: 'Turkish' }[this.state.language];\n    const guideTitle = guideData.find((g) => g.key === this.state.guidance).title;\n    const paceLabel = paceData.find((x) => x.key === this.state.pace).label;\n    const summary = p.name + ' · ' + guideTitle + ' · ' + paceLabel + ' pace · ' + feat.name;\n    const startStyle = 'height: 56px; border-radius: 18px; background: ' + accent + '; color: #16142a; font-size: 16px; font-weight: 700; letter-spacing: 0.3px; display: flex; align-items: center; justify-content: center; gap: 9px; cursor: pointer; box-shadow: 0 12px 34px ' + rgba(0.34) + ';';\n\n    return {\n      rootStyle, labelStyle, heroStyle, accentColor: accent, ink, muted, faint,\n      prayerTime: p.time, heroEyebrow: p.eyebrow.toUpperCase() + ' · UP NEXT',\n      p_ar: p.ar, p_name: p.name, rakahText,\n      langs, paces, voices, guides, muezzins, feat, featuredStyle, featAvatarStyle, wave,\n      summary, startLabel: 'Begin ' + p.name, startStyle,\n      sheetOpen: this.state.sheetOpen, trueVal: true,\n      openSheet: () => this.setState({ sheetOpen: true }),\n      closeSheet: () => this.setState({ sheetOpen: false }),\n      prayerChips, units, sheetBreakdown, sheetTotalText, sheetDoneStyle,\n      onStart: () => {},\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
